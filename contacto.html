    <main>
        <section>
            <h2>Datos de contacto</h2>
            <p><strong>Correo:</strong> matdazarb@gmail.com</p>
            <p><strong>Correo Institucional:</strong> medaza@ucompensar.edu.co</p>
            <p><strong>Teléfono:</strong> +57 320 237 1175</p>
            <p><strong>Ciudad:</strong> Bogotá D.C.</p>
        </section>

        <section>
            <h2>Contacto (Contact)</h2> <p>
                Si deseas comunicarte con Mateo,
                completa el siguiente formulario.
            </p> <form>
                <div>
                    <label for="nombre">
                        Nombre
                        (Name)
                    </label> <input id="nombre" type="text" required placeholder="Ej: Carlos
Valdes">
                </div>
                <div>
                    <label for="correo">Correo electrónico (Email)</label>
                    <input id="correo" type="email" required placeholder="matdazarb@gmail.com">
                </div>
                <div>
                    <label for="correo">Correo electrónico Institucional (Email)</label>
                    <input id="correo" type="email" required placeholder="medaza@ucompensar.edu.co">
                </div>
                <div>
                    <label for="telefono">Teléfono (Phone)</label>
                    <input id="telefono" type="tel" placeholder="+57 320 237 1175">
                </div>
                <div>
                    <label for="motivo">Motivo del contacto (Reason)</label>
                    <select id="motivo" required>
                        <option value="">Selecciona una opción</option>
                        <option value="cotizacion">Cotización de proyecto</option>
                        <option value="colaboracion">Colaboración</option>
                        <option value="Ofertas de empleo">Oportunidad laboral</option>
                    </select>
                </div>
                <div>
                    <label for="mensaje">Mensaje (Message)</label>
                    <textarea id="mensaje" required minlength="15" maxlength="330"
                              placeholder="Describe tu solicitud con mínimo 15 caracteres"></textarea>
                </div>
                <div>
                    <input id="acepto" type="checkbox" required>
                    <label for="acepto">Acepto el tratamiento de datos (I agree)</label>
                </div>
                <div>
                    <button type="submit">Enviar mensaje (Submit)</button>
                </div>
            </form>
        </section>
